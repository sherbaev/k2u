# Mosquitto config for the K2U platform.
# Dev: plaintext on 1883. Production: TLS on 8883 with per-device auth + ACL.

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice

# --- Local dev listener (plaintext) ---
listener 1883 0.0.0.0
# Dev only: allow anonymous. DISABLE in production.
allow_anonymous true

# --- Production TLS listener (uncomment on Coolify) ---
# listener 8883 0.0.0.0
# cafile   /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile  /mosquitto/config/certs/server.key
# require_certificate true      # mTLS: each device presents a client cert
# tls_version tlsv1.2
# allow_anonymous false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/aclfile
